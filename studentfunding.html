<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start Funding · Student Loan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .funding-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 480px;
            padding: 2.5rem 2rem;
            transition: transform 0.3s ease;
        }

        .funding-card:hover {
            transform: translateY(-4px);
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;  
            color: #1a1f36;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subhead {
            color: #5b6e8c;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            line-height: 1.5;
            border-left: 3px solid #667eea;
            padding-left: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2d3a5e;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: "▼";
            font-size: 0.8rem;
            color: #667eea;
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        select {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            background-color: white;
            color: #1a1f36;
            appearance: none;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        select:hover {
            border-color: #a0b4d7;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .btn {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .result {
            margin-top: 2rem;
            padding: 1.2rem;
            background: #f8fafd;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            display: none;
            color: #2d3a5e;
            font-weight: 500;
            text-align: center;
            transition: all 0.3s;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .funding-icon {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .funding-icon span {
            font-size: 2.5rem;
            background: rgba(102, 126, 234, 0.1);
            padding: 0.75rem 1.5rem;
            border-radius: 60px;
            display: inline-block;
        }

        /* small screens */
        @media (max-width: 480px) {
            .funding-card {
                padding: 2rem 1.25rem;
            }
            h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="funding-card">
        <div class="funding-icon">
            <span>🎓💰</span>
        </div>
        <h1>Start your funding</h1>
        <div class="subhead">
            Choose the type of funding that fits your journey.<br>
            We’ll guide you through the next steps.
        </div>
        <form id="fundingForm">
            <div class="form-group">
                <label for="fundingType">I'm looking for</label>
                <div class="select-wrapper">
                    <select id="fundingType" name="fundingType">
                        <option value="student-loan" selected>Student Loan</option>
                        <option value="personal-loan">Personal Loan</option>
                        <option value="business-loan">Business Loan</option>
                        <option value="mortgage">Mortgage</option>
                        <option value="scholarship">Scholarship / Grant</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn">Continue →</button>
        </form>
        <div id="result" class="result">
            <!-- will be filled by JS -->
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('fundingForm');
            const select = document.getElementById('fundingType');
            const resultDiv = document.getElementById('result');

            form.addEventListener('submit', function(e) {
                e.preventDefault();  // prevent page reload

                // Get the selected option text (more friendly than value)
                const selectedText = select.options[select.selectedIndex].text;
                
                // Update result message
                resultDiv.textContent = `✅ You selected: ${selectedText}. Let's get started!`;
                
                // Show the result box with animation
                resultDiv.classList.add('show');

                // Optional: smooth scroll to result (if needed)
                resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            });

            // Optional: update result when dropdown changes (just for demo)
            select.addEventListener('change', function() {
                // If result is already shown, you could update it live
                if (resultDiv.classList.contains('show')) {
                    const selectedText = select.options[select.selectedIndex].text;
                    resultDiv.textContent = `✅ You selected: ${selectedText}. Let's get started!`;
                }
            });
        })();
    </script>
</body>
</html>
